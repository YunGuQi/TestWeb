    // Page Transition Engine
    function transitionPage(fromKey, toKey, onCompleteObj) {
        const fromEl = pages[fromKey];
        const toEl = pages[toKey];
        
        const tl = gsap.timeline();
        
        tl.to(fromEl, {
            opacity: 0,
            y: -30,
            filter: "blur(8px)",
            duration: 0.5,
            ease: customEase,
            onComplete: () => {
                fromEl.classList.remove('active');
                fromEl.style.opacity = 1; 
                fromEl.style.transform = "none";
                fromEl.style.filter = "none";
                
                toEl.classList.add('active');
                gsap.set(toEl, { opacity: 0, y: 40, filter: "blur(12px)" });
            }
        });
        
        if (onCompleteObj) tl.call(onCompleteObj);

        tl.to(toEl, {
            opacity: 1,
            y: 0,
            filter: "blur(0px)",
            duration: 0.9,
            ease: customEase
        });
    }

        try {
            const historyStr = localStorage.getItem('emotional_friction_history');
            const historyData = historyStr ? JSON.parse(historyStr) : [];
            
            if (Array.isArray(historyData) && historyData.length > 0) {
                historyData.forEach((record, index) => {
                    const el = document.createElement('div');
                    el.className = 'doppel-shell cursor-pointer group hover:scale-[1.01] transition-transform active:scale-[0.99]';
                    const title = results[record.key]?.title || '未知结果';
                    el.innerHTML = `
                        <div class="doppel-core bg-white/[0.03] p-4 flex justify-between items-center">
                            <div>
                                <h4 class="text-sm font-bold text-white mb-1">${title} <span class="text-cyberblue font-mono text-[10px] ml-2">#${historyData.length - index}</span></h4>
                                <p class="text-xs text-gray-500">${record.date} · 得分: ${record.score}</p>
                            </div>
                            <svg class="w-5 h-5 text-gray-600 group-hover:text-cyberblue transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    `;
                    el.onclick = () => {
                        totalScore = record.score;
                        closeHistoryModal(null, true);
                        generateResult('landing', false);
                    };
                    historyList.appendChild(el);
                });
            } else {
                historyList.innerHTML = '<p class="text-center text-sm text-gray-500 py-4">暂无历史记录</p>';
            }
        } catch(e) {}
        
        historyModal.classList.add('show');
    }

    function closeHistoryModal(e, force = false) {
        if (!force && e && e.target !== historyModal && !e.target.closest('.modal-close')) return;
        historyModal.classList.remove('show');
    }

    // Load History Button on Startup
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const historyStr = localStorage.getItem('emotional_friction_history');
            if (historyStr) {
                let historyData = JSON.parse(historyStr);
                // 兼容老版本单条记录
                if (!Array.isArray(historyData) && historyData.score) {
                    historyData = [{
                        score: historyData.score,
                        key: historyData.key,
                        date: new Date().toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                    }];
                    localStorage.setItem('emotional_friction_history', JSON.stringify(historyData));
                }
                
                if (Array.isArray(historyData) && historyData.length > 0) {
                    document.getElementById('history-container').classList.remove('hidden');
                }
            }
        } catch(e) {}
    });

    // Poster Generation Logic
    async function generatePoster() {
        const modal = document.getElementById('poster-modal');
        const container = document.getElementById('poster-img-container');
        
        modal.classList.add('show');
        container.innerHTML = '<span class="text-white/40 text-sm animate-pulse" id="poster-loading">正在合成专属能量场...</span>';
        
        // Hide UI elements we don't want in the screenshot
        document.getElementById('result-bottom-bar').style.display = 'none';
        
        // Ensure fonts are loaded before capturing
        await document.fonts.ready;
        
        // Capture the primary result card
        const targetCard = document.querySelector('#result-page .doppel-shell');
        
        try {
            const canvas = await html2canvas(targetCard, {
                backgroundColor: '#0a0a0c', 
                scale: window.devicePixelRatio > 1 ? window.devicePixelRatio : 2,
                useCORS: true,
                logging: false,
                onclone: (clonedDoc) => {
                    // Inject a watermark in the clone
                    const cloneCard = clonedDoc.querySelector('.doppel-core');
                    if (cloneCard) {
                        const watermark = clonedDoc.createElement('div');
                        watermark.className = 'mt-6 pt-4 border-t border-white/10 flex justify-between items-center';
                        watermark.innerHTML = `
                            <span class="text-[10px] text-gray-500 tracking-widest">在小红书搜【测试同款】</span>
                            <span class="text-[10px] text-cyberblue font-mono">1分钱测算灵魂频率</span>
                        `;
                        cloneCard.appendChild(watermark);
                    }
                }
            });
            
            const img = document.createElement('img');
            img.src = canvas.toDataURL('image/png', 0.9);
            img.className = 'w-full h-full object-contain';
            
            container.innerHTML = '';
            container.appendChild(img);
        } catch (e) {
            console.error(e);
            container.innerHTML = '<span class="text-red-400 text-sm">海报生成失败，请稍后重试</span>';
        } finally {
            document.getElementById('result-bottom-bar').style.display = 'block';
        }
    }

    function closePosterModal(e) {
        const modal = document.getElementById('poster-modal');
        if (e && e.target !== modal && !e.target.closest('.modal-close')) return;
        modal.classList.remove('show');
    }
    </script>
</body>
</html>
