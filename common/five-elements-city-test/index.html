<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>地气勘探局 · 迁徙调令</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 农历阳历转换库 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'paper': '#f0ebe1',
                        'ink': '#1a1a1a',  
                        'stamp': '#ab2828',
                        'metal': '#949494', 
                        'wood': '#5b7051',  
                        'water': '#364f6b', 
                        'fire': '#a33b3b',  
                        'earth': '#8f7754', 
                    },
                    fontFamily: {
                        'serif': ['"Noto Serif SC"', '"Songti SC"', '"SimSun"', 'serif'],
                        'sans': ['"PingFang SC"', '"Microsoft YaHei"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- html-to-image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        body {
            background-color: #f0ebe1;
            color: #1a1a1a;
            font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            overscroll-behavior-y: none;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 0.2em;
        }

        .hover-line-btn {
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hover-line-btn::after {
            content: '';
            position: absolute;
            left: 0; bottom: 0; width: 0; height: 1px;
            background-color: #1a1a1a;
            transition: width 0.3s ease;
        }
        .hover-line-btn:hover::after { width: 100%; }

        .active-press:active { transform: scale(0.98) translateY(1px); }

        .stamp-vintage {
            border: 2px solid #ab2828;
            color: #ab2828;
            font-weight: 900;
            opacity: 0.85;
            mix-blend-mode: multiply;
            transform: rotate(-10deg);
        }

        .fade-enter { animation: fadeEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeEnter { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes spin-slow-reverse { 100% { transform: rotate(-360deg); } }
        
        .compass-outer { animation: spin-slow 40s linear infinite; }
        .compass-inner { animation: spin-slow-reverse 30s linear infinite; }
        
        @keyframes needle-shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            50% { transform: rotate(-1.5deg); }
            75% { transform: rotate(1deg); }
            100% { transform: rotate(0deg); }
        }
        .needle-animate {
            transform-origin: bottom center;
            animation: needle-shake 0.5s ease-in-out infinite;
        }

        ::-webkit-scrollbar { display: none; }
        
        select {
            appearance: none;
            background: transparent;
            border-bottom: 1px solid rgba(26,26,26,0.3);
            border-radius: 0;
            padding: 8px 0;
            font-family: inherit;
            color: #1a1a1a;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        select:focus { border-color: #1a1a1a; }
        
        /* Modal Animation */
        .modal-enter { animation: modalFade 0.3s ease forwards; }
        @keyframes modalFade { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(4px); } }
    </style>
</head>
<body class="min-h-screen flex justify-center">

    <div id="app" class="w-full max-w-md min-h-screen relative flex flex-col border-x border-ink/5">
        
        <!-- ================= 1. LANDING PAGE ================= -->
        <div id="landing-page" class="flex-1 flex flex-col p-8 fade-enter">
            <div class="flex justify-between items-start mt-12 mb-16">
                <div class="w-8 h-8 rounded-full border border-ink flex items-center justify-center text-xs">局</div>
                <h1 class="vertical-text text-4xl font-black text-ink">地气勘探局</h1>
                <div class="vertical-text text-xs text-ink/60 mt-12 tracking-widest font-sans">

                <p class="text-[13px] leading-loose text-ink/80 text-justify mb-8">

                </p>
                <button onclick="navTo('bazi-page')" class="group flex items-center justify-between w-full border-b border-ink pb-4 hover-line-btn active-press">

                </button>

                    <button id="history-entry" onclick="openHistoryModal()" class="hidden text-xs text-ink/50 hover:text-ink transition-colors tracking-widest underline underline-offset-4">调取历史档案</button>

    <script>
        // 历法切换与日期重新渲染逻辑
        let currentCalendar = 'solar';
        const lunarMonths = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
        const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

        function renderDateOptions(type, targetYear, targetMonth, targetDay) {
            const yearSelect = document.getElementById('bazi-year');
            const monthSelect = document.getElementById('bazi-month');
            const daySelect = document.getElementById('bazi-day');
            
            yearSelect.innerHTML = '';
            monthSelect.innerHTML = '';
            daySelect.innerHTML = '';
            
            for(let i=1970; i<=2020; i++) { yearSelect.add(new Option(`${i}年`, i)); }
            yearSelect.value = targetYear || "1995";
            
            for(let i=1; i<=12; i++) { 
                const text = type === 'lunar' ? lunarMonths[i-1] : `${i}月`;
                monthSelect.add(new Option(text, i)); 
            }
            monthSelect.value = targetMonth || "1";
            
            const dayCount = type === 'lunar' ? 30 : 31;
            for(let i=1; i<=dayCount; i++) { 
                const text = type === 'lunar' ? lunarDays[i-1] : `${i}日`;
                daySelect.add(new Option(text, i)); 
            }
            
            if (parseInt(targetDay) > dayCount) {
                daySelect.value = dayCount.toString();
            } else {
                daySelect.value = targetDay || "1";
            }
        }

        function setCalendar(type) {
            if (currentCalendar === type) return;

            const yearSelect = document.getElementById('bazi-year');
            const monthSelect = document.getElementById('bazi-month');
            const daySelect = document.getElementById('bazi-day');
            
            let y = parseInt(yearSelect.value || 1995);
            let m = parseInt(monthSelect.value || 1);
            let d = parseInt(daySelect.value || 1);

            if (typeof Lunar !== 'undefined') {
                if(currentCalendar === 'solar' && type === 'lunar') {
                    try {
                        const lunarDate = Lunar.fromDate(new Date(y, m - 1, d));
                        y = lunarDate.getYear();
                        m = Math.abs(lunarDate.getMonth());
                        d = lunarDate.getDay();
                    } catch(e) { console.error(e); }
                } else if(currentCalendar === 'lunar' && type === 'solar') {
                    try {
                        const lunarDate = Lunar.fromYmd(y, m, d);
                        const solarDate = lunarDate.getSolar();
                        y = solarDate.getYear();
                        m = solarDate.getMonth();
                        d = solarDate.getDay();
                    } catch(e) { console.error(e); }
                }
            }

            currentCalendar = type;
            if(type === 'solar') {
                document.getElementById('cal-solar').classList.replace('bg-transparent', 'bg-ink');
                document.getElementById('cal-solar').classList.replace('text-ink', 'text-paper');
                document.getElementById('cal-lunar').classList.replace('bg-ink', 'bg-transparent');
                document.getElementById('cal-lunar').classList.replace('text-paper', 'text-ink');
            } else {
                document.getElementById('cal-lunar').classList.replace('bg-transparent', 'bg-ink');
                document.getElementById('cal-lunar').classList.replace('text-ink', 'text-paper');
                document.getElementById('cal-solar').classList.replace('bg-ink', 'bg-transparent');
                document.getElementById('cal-solar').classList.replace('text-paper', 'text-ink');
            }
            renderDateOptions(type, y, m, d);
        }

        const savedBazi = JSON.parse(localStorage.getItem('diqi_bazi_state') || 'null');
        if (savedBazi) {
            currentCalendar = savedBazi.calendar;
            if(currentCalendar === 'solar') {
                document.getElementById('cal-solar').classList.replace('bg-transparent', 'bg-ink');
                document.getElementById('cal-solar').classList.replace('text-ink', 'text-paper');

        function calculateBaziAndNav() {
            const year = parseInt(document.getElementById('bazi-year').value);
            const month = parseInt(document.getElementById('bazi-month').value);
            const day = parseInt(document.getElementById('bazi-day').value);
            const timeRaw = document.getElementById('bazi-time').value;
            let time = timeRaw;

            // 保存用户输入的八字记录，下次自动回显
            localStorage.setItem('diqi_bazi_state', JSON.stringify({
                calendar: currentCalendar,
                year: year,
                month: month,
                day: day,
                time: timeRaw
            }));

            if(currentCalendar === 'lunar') {
                scores['土'] += 0.2; // 微小偏移
            }

            const lastDigit = year % 10;
            if([0,1].includes(lastDigit)) scores['金'] += 0.5;
            else if([2,3].includes(lastDigit)) scores['水'] += 0.5;
            else if([4,5].includes(lastDigit)) scores['木'] += 0.5;
            else if([6,7].includes(lastDigit)) scores['火'] += 0.5;
            else scores['土'] += 0.5;

            if([1,2].includes(month)) scores['木'] += 0.5;
            else if([4,5].includes(month)) scores['火'] += 0.5;
            else if([7,8].includes(month)) scores['金'] += 0.5;
            else if([10,11].includes(month)) scores['水'] += 0.5;
            else scores['土'] += 0.5;

            const dayDigit = day % 10; 
            if([1,6].includes(dayDigit)) scores['水'] += 0.5;
            else if([2,7].includes(dayDigit)) scores['火'] += 0.5;
            else if([3,8].includes(dayDigit)) scores['木'] += 0.5;
            else if([4,9].includes(dayDigit)) scores['金'] += 0.5;
            else scores['土'] += 0.5; 

            if(time === '未知') {
                const elements = ['金','木','水','火','土'];
                time = elements[Math.floor(Math.random() * elements.length)];
                scores[time] += 0.5;
            } else {
                const timeMap = { '子':'水', '丑':'土', '寅':'木', '卯':'木', '辰':'土', '巳':'火', '午':'火', '未':'土', '申':'金', '酉':'金', '戌':'土', '亥':'水' };
                scores[timeMap[time]] += 0.5;
            }

            navTo('quiz-page');
            renderQuestion();
        }

        function generateResult() {
            navTo('result-page');

            let maxScore = 0;
            let topElement = '';
            for (const [elem, score] of Object.entries(scores)) {
                if (score > maxScore) { maxScore = score; topElement = elem; }
            }
            
            const result = elementData[topElement];
            
            const scoreStr = `${scores['金']}-${scores['木']}-${scores['水']}-${scores['火']}-${scores['土']}`;
            let hash = 0;
            for(let i = 0; i < scoreStr.length; i++) {
                hash = scoreStr.charCodeAt(i) + ((hash << 5) - hash);
            }
            const absHash = Math.abs(hash);
            
            const n = result.cities.length;
            const idx1 = absHash % n;
            let idx2 = (absHash + Math.max(1, Math.floor(n / 2))) % n;
            if (idx1 === idx2) idx2 = (idx2 + 1) % n;
            
            const displayCity = `${result.cities[idx1]}/${result.cities[idx2]}`;

            document.getElementById('result-desc').innerHTML = result.desc;
            document.getElementById('result-city').innerText = displayCity;

            // 保存历史记录列表
            const docId = document.getElementById('doc-id').innerText;
            const histList = JSON.parse(localStorage.getItem('diqi_history_list') || '[]');
            
            // 避免完全相同的记录重复存
            const isDuplicate = histList.length > 0 && histList[histList.length-1].docId === docId;
            if(!isDuplicate) {
                histList.push({
                    timestamp: Date.now(),
                    scores: scores,
                    desc: result.desc,
                    city: displayCity,
                    docId: docId
                });
                localStorage.setItem('diqi_history_list', JSON.stringify(histList));
            }

            drawRadarChart();
        }

        function drawRadarChart() {
            const elements = ['火', '土', '金', '水', '木'];
            const maxRadius = 75; 
            const centerX = 100, centerY = 100;
            let pointsStr = '';
            
            const maxScoreAmongAll = Math.max(...Object.values(scores));

            document.getElementById('label-fire').textContent = `火能量: ${scores['火']}`;
            document.getElementById('label-earth').textContent = `土能量: ${scores['土']}`;
            document.getElementById('label-metal').textContent = `金能量: ${scores['金']}`;
            document.getElementById('label-water').textContent = `水能量: ${scores['水']}`;
            document.getElementById('label-wood').textContent = `木能量: ${scores['木']}`;

            elements.forEach((elem, index) => {
                const angleDeg = -90 + (index * 72);
                const angleRad = angleDeg * (Math.PI / 180);
                
                const score = scores[elem];
                const normalizedScore = maxScoreAmongAll > 0 ? 0.35 + (score / maxScoreAmongAll) * 0.65 : 0.35; 
                const radius = normalizedScore * maxRadius;
                
                const x = centerX + radius * Math.cos(angleRad);
                const y = centerY + radius * Math.sin(angleRad);
                pointsStr += `${x},${y} `;
            });
            
            setTimeout(() => {
                const poly = document.getElementById('radar-shape');
                poly.style.transition = 'all 1.5s cubic-bezier(0.16, 1, 0.3, 1)';
                poly.setAttribute('points', pointsStr.trim());
            }, 100);
        }
