<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深林潜意识测试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- 首页视图 -->
        <section id="page-landing" class="page active">
            <div class="landing-content">
                <div class="hero-image">🌲</div>
                <h1 class="title">深林潜意识测试</h1>
                <p class="subtitle">外网爆火的深层心理透视</p>
                <div class="trust-badge">已有 12,458 人完成测试</div>
                <button class="btn btn-primary" onclick="app.startTest()">开启内心的探索</button>
            </div>
        </section>

        <!-- 答题视图 -->
        <section id="page-quiz" class="page">
            <div class="quiz-header">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="progress-text">进度 <span id="current-question-num">1</span>/3</div>
            </div>
            <div class="quiz-content">
                <h2 id="question-text" class="question-title">加载中...</h2>
                <div id="options-container" class="options-list">
                    <!-- 选项由JS动态注入 -->
                </div>
            </div>
        </section>

        <!-- 加载视图 -->
        <section id="page-loading" class="page">
            <div class="loading-content">
                <div class="spinner"></div>
                <p>正在生成您的潜意识解析...</p>
            </div>
        </section>

        <!-- 结果视图 -->
        <section id="page-result" class="page">
            <div class="result-content">
                <div class="result-card">
                    <p class="result-label">您的深层隐藏人格是</p>
                    <h1 id="result-title" class="result-title">加载中</h1>
                    <div id="result-desc" class="result-desc">加载中</div>
                </div>
                
                <div class="action-card">
                    <p class="action-hint">想要获取长达 2000 字的完整潜意识分析报告，以及专属的性格疗愈指南吗？</p>
                    <!-- 引导至店铺，避开“购买”敏感词 -->
                    <a href="https://www.xiaohongshu.com" class="btn btn-primary" id="shop-btn">获取完整深度解析</a>
                </div>

                <div class="disclaimer">
                    <p>免责声明：本测试结果仅供娱乐参考，不作为任何专业心理学或医学诊断依据。如有心理困扰请咨询专业医师。</p>
                </div>
            </div>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
